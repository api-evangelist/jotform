description: >-
  Jotform sells five tiers — Starter (free), Bronze, Silver, Gold and
  Enterprise — each with progressively higher form, submission, storage and
  daily-API-call ceilings. Annual billing offers list discounts. Gold tier
  unlocks HIPAA-friendly capabilities; Enterprise unlocks unlimited resources
  and a multi-user team environment.
notes: >-
  Public list prices and limits as of 2026-05-08. Daily API call ceilings
  are tier-specific and act as the primary platform throttle.
sources:
- https://www.jotform.com/pricing/
- https://api.jotform.com/docs/#rate-limits
