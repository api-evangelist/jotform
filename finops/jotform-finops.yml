- Workflow
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps profile for Jotform. Costs are flat monthly tier fees
  (Starter free / Bronze $39 / Silver $49 / Gold $129 / Enterprise custom)
  with implicit ceilings on active forms, monthly submissions, storage and
  daily API calls. Annual billing reduces effective rate.
notes: >-
  Optimisation is mostly about right-sizing the tier — submissions, storage
  and API daily-call rates are the dominant scaling drivers.
sources:
- https://www.jotform.com/pricing/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Jotform
serviceCategory: Forms / Workflow
billingModel:
  pricingCategory: Subscription (tiered ceilings)
  billingFrequency: Monthly / Annual
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Jotform
  ServiceCategory: Forms
  ProviderName: Jotform
  PublisherName: Jotform
  InvoiceIssuerName: Jotform
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingUnit: plan-month
meters:
- name: plan_subscription
  description: Flat plan fee (Bronze/Silver/Gold/Enterprise).
  unit: month
  aggregation: sum
  dimensions:
  - account
  - plan
- name: monthly_submissions
  description: Form submissions counted against the plan's monthly ceiling.
  unit: submission
  aggregation: sum
  dimensions:
  - account
  - form
- name: active_forms
  description: Active forms in the account (counts toward plan ceiling).
  unit: form
  aggregation: max
  dimensions:
  - account
- name: storage
  description: File and submission storage used.
  unit: GB-month
  aggregation: avg
  dimensions:
  - account
- name: api_calls
  description: Daily API calls counted against tier daily ceiling.
  unit: request
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Use the Jotform admin Usage page; export submission counts per form.
- name: Allocation
  description: Use sub-accounts (Enterprise) or form-naming conventions to allocate by team.
- name: Optimization
  description: Archive low-traffic forms; right-size tier annually; prefer webhooks over /submissions polling to keep API calls low.
- name: Accountability
  description: Assign account owners; alert at 75% of plan submission ceiling.
maintainers:
